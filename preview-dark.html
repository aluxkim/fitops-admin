            '<button type="button" class="btn btn-red" id="pm-save">' + (isEdit ? 'Save changes' : 'Create plan') + '</button>' +
            '</div></div>';

          document.body.appendChild(overlay);
          document.getElementById("pricing-modal-close").onclick = closePricingModal;
          document.getElementById("pm-cancel").onclick = closePricingModal;
          document.getElementById("pm-save").onclick = function () {
            var name = document.getElementById("pm-name").value.trim();
            if (!name) { document.getElementById("pm-name").focus(); return; }
            var plan = {
              id: isEdit ? existing.id : "plan-custom-" + Date.now(),
              name: name,
              category: document.getElementById("pm-category").value,
              price: parseFloat(document.getElementById("pm-price").value) || 0,
              period: document.getElementById("pm-period").value,
              desc: document.getElementById("pm-desc").value.trim(),
              features: document.getElementById("pm-features").value.split("\n").map(function (l) { return l.trim(); }).filter(Boolean),
              active: true,
              memberCount: isEdit ? existing.memberCount : 0,
              featured: isEdit ? existing.featured : false
            };
            if (isEdit) {
              var idx = pricingPlans.findIndex(function (x) { return x.id === existing.id; });
              if (idx >= 0) pricingPlans[idx] = plan;
            } else {
              pricingPlans.push(plan);
            }
            closePricingModal();
            render();
          };
          document.addEventListener("keydown", pricingEscHandler);
        }

        function pricingEscHandler(e) { if (e.key === "Escape") closePricingModal(); }

        function closePricingModal() {
          var el = document.getElementById("pricing-modal-overlay");
          if (el) el.remove();
          document.removeEventListener("keydown", pricingEscHandler);
        }

        function renderCommerce() {
          const catRows = merchCatalog
            .map(
              (m) =>
                "<tr><td>" +
                escapeHtml(m.sku) +
                "</td><td>" +
                escapeHtml(m.name) +
                "</td><td>" +
                formatMoney(m.msrp) +
                "</td></tr>",
            )
            .join("");
          const ids = getScopedLocationIds();
          const stocks = stockByLocation.filter(
            (r) => !ids || ids.includes(r.locationId),
          );
          const invRows = stocks
            .map((r) => {
              const item = merchCatalog.find((x) => x.id === r.itemId);
              const revenue = r.soldThisMonth * (item ? item.msrp : 0);
              return (
                "<tr><td>" +
                escapeHtml(locationName(r.locationId)) +
                "</td><td>" +
                escapeHtml(item ? item.name : r.itemId) +
                "</td><td>" +
                r.units +
                "</td><td>" +
                r.soldThisMonth +
                "</td><td>" +
                formatMoney(revenue) +
                "</td></tr>"
              );
            })
            .join("");
          return (
            '<h1 class="page-title">Commerce</h1>' +
            '<p class="page-sub">Same catalog everywhere; stock and sales per location.</p>' +
            "<h2 style=\"font-size:1rem;margin:24px 0 8px\">Catalog (MSRP)</h2>" +
            '<div class="table-wrap" style="max-height:none"><table><thead><tr><th>SKU</th><th>Product</th><th>MSRP</th></tr></thead><tbody>' +
            catRows +
            "</tbody></table></div>" +
            "<h2 style=\"font-size:1rem;margin:24px 0 8px\">Inventory & sales (scoped)</h2>" +
            '<div class="table-wrap"><table><thead><tr>' +
            "<th>Location</th><th>Product</th><th>On hand</th><th>Sold (mo)</th><th>Retail ($)</th>" +
            "</tr></thead><tbody>" +
            invRows +
            "</tbody></table></div>"
          );
        }

        function renderMarketing() {
          const rows = filterByLoc(campaigns, (c) => c.locationId)
            .map(
              (c) =>
                "<tr><td>" +
                escapeHtml(c.name) +
                "</td><td>" +
                escapeHtml(locationName(c.locationId)) +
                '</td><td><a class="link" href="' +
                escapeAttr(c.instagramUrl) +
                '" target="_blank" rel="noopener">Open link</a></td><td style="font-size:0.8rem">utm_source=' +
                escapeHtml(c.utm.source) +
                " · utm_campaign=" +
                escapeHtml(c.utm.campaign) +
                "</td><td>" +
                c.signupsAttributed +
                "</td></tr>",
            )
            .join("");
          return (
            '<h1 class="page-title">Marketing</h1>' +
            '<p class="page-sub">Instagram destination + UTM parameters for attribution.</p>' +
            '<div class="table-wrap"><table><thead><tr>' +
            "<th>Campaign</th><th>Location</th><th>Instagram</th><th>UTM</th><th>Signups</th>" +
            "</tr></thead><tbody>" +
            rows +
            "</tbody></table></div>"
          );
        }

        function renderInsights() {
          const scope = state.scopeLocationId;
          const visible = aiInsights.filter(function (i) {
            if (i.locationId === "all") return true;
            if (state.role === "owner" && scope === "all") return true;
            return i.locationId === scope;
          });
          const blocks = visible
            .map(function (i) {
              const cls =
                i.severity === "warning"
                  ? "insight-warn"
                  : i.severity === "success"
                    ? "insight-ok"
                    : "insight-info";
              return (
                '<div class="banner insight ' +
                cls +
                '"><strong>' +
                escapeHtml(i.title) +
                "</strong> " +
                escapeHtml(i.detail) +
                "</div>"
              );
            })
            .join("");
          return (
            '<h1 class="page-title">AI insights</h1>' +
            '<p class="page-sub">Scoped to your location filter (prototype copy).</p>' +
            blocks
          );
        }

        function escapeHtml(s) {
          return String(s)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }

        function escapeAttr(s) {
          return escapeHtml(s).replace(/'/g, "&#39;");
        }

        function render() {
          renderNav();
          fillScopeSelect();
          const root = document.getElementById("views");
          let h = window.location.hash || "#overview";
          if (h.indexOf("#member/") === 0) {
            root.innerHTML = renderMemberDetail(h.slice("#member/".length));
            return;
          }
          if (h === "#" || h === "") h = "#overview";
          const map = {
            "#overview": renderOverview,
            "#members": renderMembers,
            "#classes": renderClasses,
            "#appointments": renderAppointments,
            "#calendar": renderCalendar,
            "#pricing": renderPricing,
            "#staff": renderStaff,
            "#commerce": renderCommerce,
            "#marketing": renderMarketing,
            "#insights": renderInsights,
          };
          const fn = map[h] || renderOverview;
          root.innerHTML = fn();
          if (h === "#members") {
            const ms = document.getElementById("ms");
            if (ms) ms.value = window.__memberSearch || "";
          }
          if (h === "#overview") {
            var op = document.getElementById("overview-period");
            if (op) {
              op.value = state.overviewPeriod;
              op.onchange = function () {
                state.overviewPeriod = op.value;
                render();
              };
            }
          }
          if (h === "#calendar") {
            var viewSel = document.getElementById("cal-view-sel");
            if (viewSel) {
              viewSel.onchange = function () {
                state.calendarView = viewSel.value;
                render();
              };
            }
            var locSel = document.getElementById("cal-loc-sel");
            if (locSel) {
              locSel.onchange = function () {
                state.calendarLocation = locSel.value;
                render();
              };
            }
            var prevBtn = document.getElementById("cal-prev");
            var nextBtn = document.getElementById("cal-next");
            if (prevBtn) prevBtn.onclick = function () { state.calendarWeekOffset--; render(); };
            if (nextBtn) nextBtn.onclick = function () { state.calendarWeekOffset++; render(); };
          }
          if (h === "#pricing") {
            var createBtn = document.getElementById("create-plan-btn");
            if (createBtn) createBtn.onclick = function () { openPricingModal(null); };
          }
        }

        document.getElementById("btn-owner").onclick = function () {
          state.role = "owner";
          state.scopeLocationId = "all";
          document.getElementById("btn-owner").className = "btn btn-red btn-sm";
          document.getElementById("btn-manager").className = "btn btn-gray btn-sm";
          render();
        };
        document.getElementById("btn-manager").onclick = function () {
          state.role = "manager";
          state.scopeLocationId = MANAGER_LOCS[0];
          document.getElementById("btn-manager").className = "btn btn-red btn-sm";
          document.getElementById("btn-owner").className = "btn btn-gray btn-sm";
          render();
        };

        document.body.addEventListener("input", function (e) {
          if (!e.target || e.target.id !== "ms") return;
          window.__memberSearch = e.target.value;
          var hash = window.location.hash || "";
          if (hash === "#members") {
            document.getElementById("views").innerHTML = renderMembers();
            var ms = document.getElementById("ms");
            if (ms) {
              ms.value = window.__memberSearch || "";
              try {
                ms.focus();
                var len = ms.value.length;
                ms.setSelectionRange(len, len);
              } catch (err) {}
            }
          }
        });

        document.body.addEventListener("click", function (e) {
          var toggle = e.target.closest(".insights-toggle");
          if (toggle) {
            var targetId = toggle.getAttribute("data-collapse");
            var body = document.getElementById(targetId);
            var chevron = toggle.querySelector(".insights-chevron");
            if (body) body.classList.toggle("collapsed");
            if (chevron) chevron.classList.toggle("collapsed");
            return;
          }
          var el = e.target;
          if (el && el.classList && el.classList.contains("staff-clickable")) {
            var staffId = el.getAttribute("data-staff-id");
            if (staffId) openStaffPanel(staffId);
          }
        });

        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape") closeStaffPanel();
        });

        window.addEventListener("hashchange", function () {
          closeStaffPanel();
          render();
        });
        window.addEventListener("load", function () {
          if (!window.location.hash) window.location.hash = "#overview";
          render();
        });

        /* ── AI assistant panel ── */
        var aiOpen = false;
        var aiMessages = [
          {
            role: "bot",
            text: "Hi! I'm your FitOps AI assistant. Ask me about attendance trends, membership metrics, staff scheduling, or marketing ideas.",
          },
        ];

        var AI_RESPONSES = [
          "Class attendance is down 6% network-wide this month. Tuesday 6pm HIIT at Downtown has the steepest drop — consider a targeted Instagram push with UTM spring-hiit.",
          "Top 3 locations by check-in growth: Austin Central (+12%), Denver Central (+9%), Nashville Central (+7%). Boston is flat — worth investigating staffing hours.",
          "8 memberships expire in the next 14 days across your scoped locations. Sending a renewal reminder campaign could retain ~60% based on past data.",
          "Your retail attach rate is 18%. Members attending 6+ classes buy merchandise 2.3× more often — try cross-selling bottles near studio exits.",
          "PT no-show rate at Seattle Central is 14% vs 8% network average. A 24-hour cancellation reminder SMS has reduced no-shows by 40% at other clubs.",
          "Based on current trends, projected MRR next month is up ~3.8%. Family plan signups are driving growth — consider a referral incentive.",
        ];
        var aiResponseIdx = 0;

        function getAiResponse() {
          var r = AI_RESPONSES[aiResponseIdx % AI_RESPONSES.length];
          aiResponseIdx++;
          return r;
        }

        function renderAiPanel() {
          var el = document.getElementById("ai-panel");
          if (!aiOpen) {
            if (el) el.remove();
            return;
          }
          if (!el) {
            el = document.createElement("div");
            el.id = "ai-panel";
            el.className = "ai-panel";
            document.body.appendChild(el);
          }
          var msgs = aiMessages
            .map(function (m) {
              return (
                '<div class="ai-msg ' +
                m.role +
                '">' +
                escapeHtml(m.text) +
                "</div>"
              );
            })
            .join("");
          el.innerHTML =
            '<div class="ai-panel-head"><h3>FitOps AI</h3>' +
            '<button type="button" class="ai-panel-close" id="ai-close" aria-label="Close assistant">✕</button></div>' +
            '<div class="ai-panel-body" id="ai-body">' +
            msgs +
            "</div>" +
            '<div class="ai-panel-input">' +
            '<input type="text" id="ai-input" placeholder="Ask about your business…" />' +
            '<button type="button" id="ai-send">Send</button>' +
            "</div>";
          var body = document.getElementById("ai-body");
          if (body) body.scrollTop = body.scrollHeight;
          document.getElementById("ai-close").onclick = function () {
            aiOpen = false;
            renderAiPanel();
            updateFabIcon();
          };
          document.getElementById("ai-send").onclick = sendAiMessage;
          document.getElementById("ai-input").onkeydown = function (e) {
            if (e.key === "Enter") sendAiMessage();
          };
          setTimeout(function () {
            var inp = document.getElementById("ai-input");
            if (inp) inp.focus();
          }, 60);
        }

        function sendAiMessage() {
          var inp = document.getElementById("ai-input");
          if (!inp) return;
          var text = inp.value.trim();
          if (!text) return;
          aiMessages.push({ role: "user", text: text });
          renderAiPanel();

          var body = document.getElementById("ai-body");
          if (body) {
            var typing = document.createElement("div");
            typing.className = "ai-typing";
            typing.innerHTML =
              "<span></span><span></span><span></span>";
            body.appendChild(typing);
            body.scrollTop = body.scrollHeight;
          }

          setTimeout(function () {
            aiMessages.push({ role: "bot", text: getAiResponse() });
            renderAiPanel();
          }, 900 + Math.random() * 600);
        }

        function updateFabIcon() {
          var fab = document.getElementById("ai-fab");
          if (!fab) return;
          if (aiOpen) {
            fab.innerHTML =
              '<svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>';
          } else {
            fab.innerHTML =
              '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.04 2 11c0 2.58 1.22 4.89 3.13 6.46V22l4.06-2.19c.88.25 1.82.38 2.81.38 5.52 0 10-4.04 10-9S17.52 2 12 2zm1.07 12.14l-2.54-2.72-4.96 2.72L10.73 9l2.6 2.72L18.2 9l-5.13 5.14z"/></svg>';
          }
        }

        (function initFab() {
          var fab = document.createElement("button");
          fab.type = "button";
          fab.className = "ai-fab";
          fab.id = "ai-fab";
          fab.setAttribute("aria-label", "Open AI assistant");
          fab.innerHTML =
            '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.04 2 11c0 2.58 1.22 4.89 3.13 6.46V22l4.06-2.19c.88.25 1.82.38 2.81.38 5.52 0 10-4.04 10-9S17.52 2 12 2zm1.07 12.14l-2.54-2.72-4.96 2.72L10.73 9l2.6 2.72L18.2 9l-5.13 5.14z"/></svg>';
          document.body.appendChild(fab);
          fab.onclick = function () {
            aiOpen = !aiOpen;
            updateFabIcon();
            renderAiPanel();
          };
        })();
      })();
    </script>
  </body>
</html>
